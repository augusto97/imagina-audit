# ═══════════════════════════════════════════════════════════════════════
# Config Nginx para Imagina Audit — copiar en ServerAvatar → Application
# → "Nginx Vhost" / "Additional Config" / "Custom Vhost" (según versión).
#
# Nginx NO lee archivos .htaccess (eso es solo Apache). Todas las reglas
# que antes estaban en .htaccess van AQUÍ.
#
# Instrucciones:
#   1. En ServerAvatar, abre tu Application.
#   2. Busca la sección "Nginx Vhost" o "Edit Vhost" o "Custom Nginx Config".
#   3. Pega el contenido de abajo REEMPLAZANDO lo que haya (si hay un
#      vhost completo) o agregando las ubicaciones (si solo permite
#      custom "location blocks").
#   4. Guarda y ServerAvatar recarga Nginx automáticamente.
#
# Si ServerAvatar solo te deja añadir location blocks adicionales (no
# reemplazar el vhost completo), copia solo el bloque marcado
# "=== BLOQUES DE LOCATION (mínimo necesario) ===" al final.
# ═══════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────
# VHOST COMPLETO (si tienes control total sobre el server block)
# ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name audit.tudominio.com;  # ← CAMBIAR por tu dominio

    root /home/USER/htdocs;           # ← CAMBIAR por la ruta real de ServerAvatar
    index index.html index.php;

    # SSL — ServerAvatar normalmente las inyecta automáticamente
    # ssl_certificate     /ruta/al/fullchain.pem;
    # ssl_certificate_key /ruta/al/privkey.pem;

    # Tamaño máximo de upload (snapshots wp-snapshot pueden ser grandes)
    client_max_body_size 16M;
    client_body_timeout  60s;

    # Timeout generoso para requests que arrancan audits (el scan
    # continúa en background tras fastcgi_finish_request, pero la
    # conexión HTTP se mantiene unos segundos hasta que se cierra).
    fastcgi_read_timeout 200s;
    proxy_read_timeout   200s;

    # === BLOQUES DE LOCATION (mínimo necesario) ===

    # 1. API: reescribe cualquier /api/* que no sea archivo real al router PHP
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
    }

    # 2. Ejecución de archivos .php (ajustar la ruta del socket según tu versión)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;  # si tu distro lo tiene, si no:
        # fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        # fastcgi_index index.php;
        # fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 200s;
    }

    # 3. Bloquear acceso directo a carpetas sensibles
    location ~ ^/(lib|analyzers|config|data|database|logs|cache)/ {
        deny all;
        return 403;
    }

    # 4. Bloquear archivos sensibles
    location ~ /\.env       { deny all; return 403; }
    location ~ \.(db|sqlite|sql)$ { deny all; return 403; }
    location ~ /\.ht        { deny all; return 403; }
    location ~ /\.git       { deny all; return 403; }

    # 5. Cache largo para assets compilados (tienen hash en el nombre)
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 6. Widget embebible: CORS abierto (ya lo setea el PHP pero por
    #    si algún día se sirve estático) y cache corto
    location /widget/ {
        expires 1h;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # 7. Fallback al SPA de React para cualquier otra ruta
    #    IMPORTANTE: este location va AL FINAL para que las reglas
    #    anteriores tengan prioridad.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─────────────────────────────────────────────────────────────────────
# Redirect HTTP → HTTPS (si ServerAvatar no lo configura automáticamente)
# ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name audit.tudominio.com;  # ← CAMBIAR por tu dominio
    return 301 https://$host$request_uri;
}
